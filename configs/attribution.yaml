seed: 42

data:
  manifest_train: manifests/attribution_train.csv
  manifest_val:   manifests/attribution_val.csv
  manifest_test:  manifests/attribution_test.csv
  frame_root: frames/
  audio_root: audio/
  num_frames: 16
  frame_size: 224
  audio_sample_rate: 16000
  audio_seconds: 4.0
  num_workers: 4
  batch_size: 8

model:
  # Must match the detector you trained.
  patch_size: 16
  embed_dim: 384
  spatial_depth: 6
  temporal_depth: 4
  num_heads: 6
  mlp_ratio: 4.0
  dropout: 0.1
  spectral_dim: 256
  residual_dim: 256
  head_hidden: 384
  # Audio branches: keep the same kind you used in detection so weights load.
  use_audio: true
  audio_encoder: wav2vec
  wav2vec_pretrained: facebook/wav2vec2-base
  wav2vec_freeze: true
  audio_embed_dim: 256
  audio_fp_dim: 256
  audio_n_mels: 80
  # Physio branch (rPPG).
  use_physio: true
  physio_embed_dim: 128
  physio_fps: 4.0
  # Path to a detector checkpoint produced by scripts/train.py
  detector_ckpt: checkpoints/best.pt

train:
  epochs: 25
  lr: 2.0e-4
  weight_decay: 0.05
  warmup_epochs: 2
  grad_clip: 1.0
  amp: true
  balanced: true            # WeightedRandomSampler over generator classes
  label_smoothing: 0.05
  # Contrastive Provenance Learning (L_CPL): pulls same-generator embeds together.
  supcon_weight: 0.5
  supcon_temperature: 0.1
  log_dir: runs/attribution/
  ckpt_dir: checkpoints/
